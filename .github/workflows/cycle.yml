name: Ciclo autonomo

on:
  schedule:
    - cron: "0 */6 * * *" # 4 cicli al giorno
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: ade-cycle
  cancel-in-progress: false

jobs:
  cycle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installa dipendenze
        run: npm install --omit=dev

      - name: Esegui un ciclo dell'entità
        env:
          # Provider AI: vedi agent/llm.mjs. Configura l'uno O l'altro.
          AI_PROVIDER: ${{ vars.AI_PROVIDER }}
          AI_MODEL: ${{ vars.AI_MODEL }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node agent/agent.mjs

      - name: Committa la nuova storia
        run: |
          git config user.name "ADE"
          git config user.email "ade-entity@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nessun cambiamento: l'entità ha riposato."
          else
            CICLO=$(node -e "try{const i=require('./memory/index.json');console.log(i.files.at(-1).ciclo)}catch{console.log('?')}")
            git commit -m "Ciclo ${CICLO}: $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
