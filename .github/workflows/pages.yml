name: Pubblica sito

# Disattivato il trigger automatico: il sito reale gira su Vercel.
# GitHub Pages non è mai stato attivato su questo repository (Settings →
# Pages → Source: GitHub Actions), quindi ad ogni push questo workflow
# falliva subito senza alcun effetto sul sito vero. Resta lanciabile a mano
# (workflow_dispatch) se in futuro si vuole attivare come mirror statico.
on:
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - id: deployment
        uses: actions/deploy-pages@v4
